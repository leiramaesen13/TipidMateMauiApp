name: Build MAUI Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Android APK
      run: dotnet build -f net9.0-android -c Release

    - name: Publish APK
      run: dotnet publish -f net9.0-android -c Release -o publish
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: publish/**/*.apk

    - name: Build Android APK (FORCE APK OUTPUT)
      run: dotnet publish TipidMateMauiApp/TipidMateMauiApp.csproj -f net9.0-android -c Release -p:AndroidPackageFormat=apk -o publish