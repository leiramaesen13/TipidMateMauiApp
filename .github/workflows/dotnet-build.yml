name: Build MAUI Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Android APK
      run: dotnet publish TipidMateMauiApp/TipidMateMauiApp.csproj -c Release -f net9.0-android -p:AndroidPackageFormat=apk -o apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: apk/**/*.apk